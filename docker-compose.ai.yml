# DEPRECATED (2026-06-15): RAG/Ollama 로컬 스택. 식단 인사이트 전환 후 미사용.
# 현행: SQL·규칙 기반 `/me/insights/*` — 일반 Postgres + `npm run dev:server` 만으로 동작.
#
# AI 로컬 데모 (Tier A): PostgreSQL(pgvector) + Ollama
# API 서버는 호스트에서 npm run dev:server 로 실행 (apps/server/.env.ai.example 참고)
#
#   npm run ai:up
#   npm run ai:pull-models
#   npm run db:migrate
#   npm run dev:server

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: diet
      POSTGRES_PASSWORD: diet
      POSTGRES_DB: diet
    volumes:
      - ai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diet -d diet"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.23.2
    gpus: all
    ports:
      - "11434:11434"
    volumes:
      - D:/dev/ai/ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    environment:
      - OLLAMA_CONTEXT_LENGTH=8192
  tei-reranker:
    # RTX 5050(Blackwell sm_120) 전용 TEI 이미지. reranker 모델 자동 인식 → /rerank 제공
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9
    gpus: all                       # 기존 ollama와 동일 방식으로 GPU 사용
    ports:
      - "8085:80"                   # 호스트 8085 → 컨테이너 80
    command: ["--model-id", "BAAI/bge-reranker-v2-m3"]
    volumes:
      - D:/dev/ai/tei:/data         # 모델 캐시 (ollama가 D:/dev/ai/ollama 쓰는 것과 동일 방식)

volumes:
  ai_pg_data:
  ollama_data:
