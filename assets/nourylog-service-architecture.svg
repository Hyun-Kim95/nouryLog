<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="mobile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="admin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowSm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#cbd5e1" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#dots)"/>

  <!-- Header -->
  <rect x="80" y="48" width="72" height="72" rx="20" fill="url(#brand)" filter="url(#shadowSm)"/>
  <text x="116" y="96" text-anchor="middle" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="34" font-weight="700" fill="#ffffff">N</text>
  <text x="176" y="82" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="36" font-weight="700" fill="#0f172a">nouryLog</text>
  <text x="176" y="112" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="18" fill="#64748b">서비스 아키텍처 · 식단 기록 · 영양 분석 · OCR</text>

  <!-- Layer labels -->
  <text x="80" y="168" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#94a3b8">CLIENT</text>
  <text x="80" y="430" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#94a3b8">SHARED</text>
  <text x="80" y="560" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#94a3b8">BACKEND</text>
  <text x="80" y="860" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#94a3b8">DATA</text>
  <text x="1240" y="560" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#94a3b8">EXTERNAL</text>

  <!-- Mobile App -->
  <g filter="url(#shadow)">
    <rect x="120" y="190" width="420" height="200" rx="24" fill="#ffffff"/>
    <rect x="120" y="190" width="8" height="200" rx="4" fill="#3b82f6"/>
    <rect x="148" y="214" width="48" height="48" rx="14" fill="url(#mobile)"/>
    <text x="172" y="246" text-anchor="middle" font-size="22">📱</text>
    <text x="212" y="232" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="24" font-weight="700" fill="#0f172a">Mobile App</text>
    <text x="212" y="258" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="15" fill="#64748b">Expo / React Native</text>
    <g font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" fill="#334155">
      <rect x="212" y="278" width="68" height="28" rx="14" fill="#eff6ff"/><text x="246" y="296" text-anchor="middle">식단기록</text>
      <rect x="288" y="278" width="48" height="28" rx="14" fill="#eff6ff"/><text x="312" y="296" text-anchor="middle">OCR</text>
      <rect x="344" y="278" width="48" height="28" rx="14" fill="#eff6ff"/><text x="368" y="296" text-anchor="middle">통계</text>
      <rect x="212" y="316" width="48" height="28" rx="14" fill="#eff6ff"/><text x="236" y="334" text-anchor="middle">체중</text>
      <rect x="268" y="316" width="58" height="28" rx="14" fill="#eff6ff"/><text x="297" y="334" text-anchor="middle">프로필</text>
    </g>
  </g>

  <!-- Admin Web -->
  <g filter="url(#shadow)">
    <rect x="1060" y="190" width="420" height="200" rx="24" fill="#ffffff"/>
    <rect x="1472" y="190" width="8" height="200" rx="4" fill="#8b5cf6" transform="translate(-8,0)"/>
    <rect x="1472" y="190" width="8" height="200" rx="4" fill="#8b5cf6"/>
    <rect x="1088" y="214" width="48" height="48" rx="14" fill="url(#admin)"/>
    <text x="1112" y="246" text-anchor="middle" font-size="22">🖥️</text>
    <text x="1152" y="232" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="24" font-weight="700" fill="#0f172a">Admin Web</text>
    <text x="1152" y="258" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="15" fill="#64748b">Vite + React</text>
    <rect x="1152" y="278" width="88" height="28" rx="14" fill="#f5f3ff"/>
    <text x="1196" y="296" text-anchor="middle" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" fill="#334155">대시보드</text>
    <rect x="1248" y="278" width="200" height="28" rx="14" fill="#f5f3ff"/>
    <text x="1348" y="296" text-anchor="middle" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" fill="#334155">회원 · 음식 · 문의 · 공지</text>
  </g>

  <!-- api-client -->
  <g filter="url(#shadow)">
    <rect x="520" y="450" width="560" height="88" rx="22" fill="#ffffff"/>
    <rect x="520" y="450" width="560" height="88" rx="22" fill="#6366f1" opacity="0.06"/>
    <text x="800" y="486" text-anchor="middle" font-family="'Consolas','Segoe UI',monospace" font-size="22" font-weight="700" fill="#4338ca">packages/api-client</text>
    <text x="800" y="514" text-anchor="middle" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="15" fill="#64748b">OpenAPI 타입 / 클라이언트</text>
  </g>

  <!-- Connectors client -> api-client -->
  <path d="M330 390 C330 420, 520 470, 620 450" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1270 390 C1270 420, 1080 470, 980 450" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- API Server container -->
  <g filter="url(#shadow)">
    <rect x="280" y="580" width="1040" height="240" rx="28" fill="#ffffff"/>
    <rect x="280" y="580" width="1040" height="6" rx="3" fill="url(#brand)"/>
    <text x="320" y="628" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="28" font-weight="700" fill="#0f172a">API Server</text>
    <text x="320" y="656" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="16" fill="#64748b">Express + Prisma</text>
    <rect x="1160" y="604" width="132" height="34" rx="17" fill="#f3e8ff" stroke="#c4b5fd" stroke-width="1"/>
    <circle cx="1180" cy="621" r="5" fill="#7c3aed"/>
    <text x="1200" y="626" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#6d28d9">Railway</text>

    <!-- routes -->
    <rect x="320" y="690" width="180" height="96" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="410" y="732" text-anchor="middle" font-family="'Consolas',monospace" font-size="22" font-weight="700" fill="#0f172a">/public</text>
    <text x="410" y="760" text-anchor="middle" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" fill="#64748b">정책 · 공개 API</text>

    <rect x="530" y="690" width="340" height="96" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="700" y="728" text-anchor="middle" font-family="'Consolas',monospace" font-size="22" font-weight="700" fill="#0f172a">/me</text>
    <text x="700" y="758" text-anchor="middle" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="16" font-weight="600" fill="#166534">인증 · 식사 · OCR · 통계</text>

    <rect x="900" y="690" width="180" height="96" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="990" y="732" text-anchor="middle" font-family="'Consolas',monospace" font-size="22" font-weight="700" fill="#0f172a">/admin</text>
    <text x="990" y="760" text-anchor="middle" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" fill="#64748b">운영 관리</text>
  </g>

  <line x1="800" y1="538" x2="800" y2="580" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <g filter="url(#shadow)">
    <rect x="600" y="880" width="400" height="88" rx="22" fill="#ffffff"/>
    <rect x="600" y="880" width="400" height="88" rx="22" fill="url(#db)" opacity="0.35"/>
    <ellipse cx="640" cy="924" rx="22" ry="10" fill="#fb923c" opacity="0.35"/>
    <rect x="618" y="914" width="44" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <ellipse cx="640" cy="914" rx="22" ry="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <text x="690" y="918" font-family="'Segoe UI',sans-serif" font-size="24" font-weight="700" fill="#0f172a">PostgreSQL</text>
    <text x="690" y="944" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="15" fill="#64748b">Railway · Prisma ORM</text>
  </g>
  <line x1="800" y1="820" x2="800" y2="880" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- External services -->
  <g filter="url(#shadow)">
    <rect x="1240" y="590" width="280" height="92" rx="18" fill="#ffffff"/>
    <rect x="1264" y="612" width="36" height="36" rx="10" fill="#fef3c7"/>
    <text x="1282" y="636" text-anchor="middle" font-size="18">👁</text>
    <text x="1312" y="624" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#0f172a">Google Cloud Vision</text>
    <text x="1312" y="646" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" fill="#64748b">OCR 영양성분 인식</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1240" y="700" width="280" height="92" rx="18" fill="#ffffff"/>
    <rect x="1264" y="722" width="36" height="36" rx="10" fill="#fce7f3"/>
    <text x="1282" y="746" text-anchor="middle" font-size="18">🔐</text>
    <text x="1312" y="734" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#0f172a">SNS Login</text>
    <text x="1312" y="756" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" fill="#64748b">Naver · Kakao · Google</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1240" y="810" width="280" height="92" rx="18" fill="#ffffff"/>
    <rect x="1264" y="832" width="36" height="36" rx="10" fill="#e0e7ff"/>
    <text x="1282" y="856" text-anchor="middle" font-size="18">📊</text>
    <text x="1312" y="844" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#0f172a">PostHog</text>
    <text x="1312" y="866" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" fill="#64748b">이용 분석 (app=nourylog)</text>
  </g>

  <line x1="1120" y1="636" x2="1240" y2="636" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <line x1="1120" y1="746" x2="1240" y2="746" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <line x1="1120" y1="856" x2="1240" y2="856" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>

  <text x="80" y="970" font-family="'Segoe UI','Malgun Gothic',sans-serif" font-size="13" fill="#94a3b8">※ 광고 · 구독 미포함</text>
</svg>
